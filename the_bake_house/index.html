<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍞 The Bake House</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fef7e8;
            padding: 30px 20px;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 3rem;
            color: #c16e3e;
        }
        .tagline {
            color: #9b6a4b;
            margin-top: 10px;
        }
        .shop-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .products-section {
            flex: 2;
            min-width: 260px;
        }
        .cart-section {
            flex: 1.2;
            min-width: 280px;
            background: #fff4e6;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            border-left: 6px solid #e6a47a;
            padding-left: 16px;
            margin-bottom: 20px;
            color: #4f2d1a;
        }
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 22px;
        }
        .product-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #fae2c6;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 28px rgba(0,0,0,0.1);
        }
        .product-emoji {
            font-size: 58px;
            margin: 10px 0;
        }
        .product-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #3b2a21;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #c16e3e;
            margin: 8px 0;
        }
        .product-stock {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }
        .add-btn {
            background: #f3cd9b;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .add-btn:hover {
            background: #e6b87a;
        }
        .add-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .cart-item-info {
            flex: 2;
        }
        .cart-item-name {
            font-weight: 600;
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qty-btn {
            background: #e6cfb2;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-item-total {
            font-weight: bold;
            min-width: 70px;
            text-align: right;
        }
        .remove-item {
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 8px;
        }
        .cart-summary {
            border-top: 2px dashed #e6c9ae;
            padding-top: 16px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: bold;
            margin: 12px 0;
        }
        .checkout-btn {
            background: #c0703a;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 80px;
            font-weight: bold;
            cursor: pointer;
        }
        .checkout-btn:hover {
            background: #9c5628;
        }
        .empty-cart {
            text-align: center;
            color: #b28b65;
            padding: 30px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c2c;
            color: #ffefcf;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 999;
        }
        .auth-section {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .auth-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .login-btn {
            background: #c0703a;
            color: white;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
        }
        .user-info {
            color: #4f2d1a;
            font-weight: 600;
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
        }
        .admin-badge {
            background: #f39c12;
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            color: #cfa87c;
            padding-top: 25px;
        }
        /* Modal Login */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
        }
        .modal-content h2 {
            margin-bottom: 20px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .modal-content .btn-login {
            width: 100%;
            padding: 12px;
            background: #c0703a;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-content .btn-login:hover {
            background: #9c5628;
        }
        .modal-content .btn-cancel {
            width: 100%;
            padding: 12px;
            background: #ccc;
            color: black;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🥐 The Bake House</h1>
        <p class="tagline">Roti handmade, rasakan suasana rumah</p>
    </header>

    <!-- Auth Section -->
    <div class="auth-section">
        <div id="userDisplay" class="user-info" style="display:none;"></div>
        <button class="auth-btn login-btn" id="loginBtn">🔑 Login</button>
        <button class="auth-btn logout-btn" id="logoutBtn" style="display:none;">🚪 Logout</button>
    </div>

    <div class="shop-grid">
        <div class="products-section">
            <div class="section-title">🍞 Menu Hari Ini</div>
            <div class="product-list" id="productList">
                <p>Loading produk...</p>
            </div>
        </div>

        <div class="cart-section">
            <div class="section-title">🛒 Keranjang</div>
            <div id="cartContainer" class="cart-items">
                <div class="empty-cart">🥨 Keranjang kosong</div>
            </div>
            <div class="cart-summary" id="cartSummary" style="display: none;">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="totalPrice">Rp 0</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Pesan Sekarang</button>
            </div>
        </div>
    </div>
    <footer>🥖 The Bake House - Fresh Every Day!</footer>
</div>

<!-- Modal Login -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>🔑 Login</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn-login" onclick="handleLogin()">Login</button>
        <button class="btn-cancel" onclick="hideLogin()">Batal</button>
    </div>
</div>

<script>
// =============================================
// KONFIGURASI
// =============================================
const API_URL = 'http://localhost:5000/api';
let cart = [];
let currentUser = null;
let token = localStorage.getItem('token') || null;

// =============================================
// UTILITY
// =============================================
function showNotif(message) {
    let oldToast = document.querySelector(".toast-msg");
    if(oldToast) oldToast.remove();

    let toast = document.createElement("div");
    toast.className = "toast-msg";
    toast.innerText = message;
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2000);
}

function getTotal() {
    return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
}

function saveCart() {
    localStorage.setItem("the_bake_house_cart", JSON.stringify(cart));
}

function loadCart() {
    let saved = localStorage.getItem("the_bake_house_cart");
    if(saved) {
        cart = JSON.parse(saved);
    }
}

// =============================================
// AUTH
// =============================================
function showLogin() {
    document.getElementById('loginModal').classList.add('active');
}

function hideLogin() {
    document.getElementById('loginModal').classList.remove('active');
}

async function handleLogin() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
        showNotif('❌ Isi username dan password!');
        return;
    }

    try {
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify(currentUser));
            
            showNotif(`✅ Selamat datang ${currentUser.full_name}!`);
            hideLogin();
            updateUI();
            renderProducts();
        } else {
            showNotif('❌ ' + data.message);
        }
    } catch (error) {
        showNotif('❌ Gagal login, coba lagi!');
        console.error(error);
    }
}

function logout() {
    token = null;
    currentUser = null;
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    showNotif('👋 Logout berhasil!');
    updateUI();
    renderProducts();
}

function checkAuth() {
    const savedToken = localStorage.getItem('token');
    const savedUser = localStorage.getItem('user');
    
    if (savedToken && savedUser) {
        token = savedToken;
        currentUser = JSON.parse(savedUser);
        updateUI();
    }
}

function updateUI() {
    const userDisplay = document.getElementById('userDisplay');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    if (currentUser) {
        userDisplay.style.display = 'block';
        userDisplay.innerHTML = `👤 ${currentUser.full_name} ${currentUser.role === 'admin' ? '<span class="admin-badge">Admin</span>' : ''}`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
    } else {
        userDisplay.style.display = 'none';
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
    }
}

// =============================================
// PRODUCTS
// =============================================
async function fetchProducts() {
    try {
        const headers = { 'Content-Type': 'application/json' };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }

        const response = await fetch(`${API_URL}/products`, { headers });
        if (!response.ok) throw new Error('Gagal fetch produk');
        return await response.json();
    } catch (error) {
        console.error('Error:', error);
        return [];
    }
}

function addToCart(productId) {
    fetchProducts().then(products => {
        const product = products.find(p => p.id === productId);
        if (!product) return;

        if (product.stock <= 0) {
            showNotif('❌ Stok habis!');
            return;
        }

        let existing = cart.find(item => item.id === productId);
        if (existing) {
            if (existing.quantity >= product.stock) {
                showNotif('❌ Stok tidak mencukupi!');
                return;
            }
            existing.quantity++;
            showNotif(`✅ ${product.name} +1 (${existing.quantity})`);
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: 1,
                emoji: product.emoji,
                maxStock: product.stock
            });
            showNotif(`🍰 ${product.name} masuk keranjang!`);
        }

        saveCart();
        renderCart();
    });
}

function updateQty(itemId, newQty) {
    let item = cart.find(i => i.id === itemId);
    if (!item) return;

    if (newQty <= 0) {
        cart = cart.filter(i => i.id !== itemId);
        showNotif(`🗑️ ${item.name} dihapus`);
    } else {
        item.quantity = newQty;
    }

    saveCart();
    renderCart();
}

function removeItem(itemId) {
    let item = cart.find(i => i.id === itemId);
    if (item) {
        cart = cart.filter(i => i.id !== itemId);
        showNotif(`❌ ${item.name} dihapus`);
        saveCart();
        renderCart();
    }
}

// =============================================
// RENDER
// =============================================
async function renderProducts() {
    const productListEl = document.getElementById("productList");
    const products = await fetchProducts();

    if (products.length === 0) {
        productListEl.innerHTML = `<p style="text-align:center;color:#888;">Belum ada produk</p>`;
        return;
    }

    productListEl.innerHTML = "";
    products.forEach(prod => {
        let card = document.createElement("div");
        card.className = "product-card";
        
        const isOutOfStock = prod.stock <= 0;
        
        card.innerHTML = `
            <div class="product-emoji">${prod.emoji || '🍞'}</div>
            <div class="product-name">${prod.name}</div>
            <div class="product-price">Rp ${prod.price.toLocaleString()}</div>
            <div class="product-stock">${isOutOfStock ? '❌ Habis' : `📦 Stok: ${prod.stock}`}</div>
            <button class="add-btn" data-id="${prod.id}" ${isOutOfStock ? 'disabled' : ''}>
                ${isOutOfStock ? 'Stok Habis' : '+ Tambah'}
            </button>
        `;
        productListEl.appendChild(card);
    });

    document.querySelectorAll(".add-btn:not([disabled])").forEach(btn => {
        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            let id = parseInt(btn.getAttribute("data-id"));
            addToCart(id);
        });
    });
}

function renderCart() {
    const cartContainer = document.getElementById("cartContainer");
    const cartSummaryDiv = document.getElementById("cartSummary");

    if (cart.length === 0) {
        cartContainer.innerHTML = `<div class="empty-cart">🥨 Keranjang kosong</div>`;
        cartSummaryDiv.style.display = "none";
        return;
    }

    cartSummaryDiv.style.display = "block";
    let html = "";
    cart.forEach(item => {
        let itemTotal = item.price * item.quantity;
        html += `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.emoji || '🍞'} ${item.name}</div>
                    <div style="font-size:12px;">Rp ${item.price.toLocaleString()}</div>
                </div>
                <div class="cart-item-qty">
                    <button class="qty-btn decr" data-id="${item.id}">−</button>
                    <span style="min-width:28px; text-align:center;">${item.quantity}</span>
                    <button class="qty-btn incr" data-id="${item.id}">+</button>
                </div>
                <div class="cart-item-total">
                    Rp ${itemTotal.toLocaleString()}
                    <button class="remove-item" data-id="${item.id}">🗑️</button>
                </div>
            </div>
        `;
    });
    cartContainer.innerHTML = html;

    let total = getTotal();
    document.getElementById("totalPrice").innerText = `Rp ${total.toLocaleString()}`;

    document.querySelectorAll(".incr").forEach(btn => {
        btn.addEventListener("click", (e) => {
            let id = parseInt(btn.getAttribute("data-id"));
            let item = cart.find(i => i.id === id);
            if (item) {
                if (item.quantity >= item.maxStock) {
                    showNotif('❌ Stok tidak mencukupi!');
                    return;
                }
                updateQty(id, item.quantity + 1);
            }
        });
    });

    document.querySelectorAll(".decr").forEach(btn => {
        btn.addEventListener("click", (e) => {
            let id = parseInt(btn.getAttribute("data-id"));
            let item = cart.find(i => i.id === id);
            if (item) updateQty(id, item.quantity - 1);
        });
    });

    document.querySelectorAll(".remove-item").forEach(btn => {
        btn.addEventListener("click", (e) => {
            let id = parseInt(btn.getAttribute("data-id"));
            removeItem(id);
        });
    });
}

// =============================================
// CHECKOUT
// =============================================
async function handleCheckout() {
    if (cart.length === 0) {
        showNotif("Keranjang kosong, pilih dulu yuk!");
        return;
    }

    if (!currentUser) {
        showNotif("⚠️ Silakan login dulu ya!");
        showLogin();
        return;
    }

    try {
        const orderData = {
            items: cart.map(item => ({
                product_id: item.id,
                quantity: item.quantity,
                price: item.price
            })),
            customer_name: currentUser.full_name || 'Customer',
            customer_phone: '08123456789',
            total_amount: getTotal()
        };

        const response = await fetch(`${API_URL}/orders`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(orderData)
        });

        const data = await response.json();

        if (response.ok) {
            showNotif(`🎉 Pesanan berhasil! Order #${data.orderNumber}`);
            cart = [];
            saveCart();
            renderCart();
            renderProducts();
        } else {
            showNotif('❌ ' + data.message);
        }
    } catch (error) {
        showNotif('❌ Gagal checkout, coba lagi!');
        console.error(error);
    }
}

// =============================================
// EVENT LISTENERS
// =============================================
document.addEventListener('DOMContentLoaded', function() {
    // Login button
    document.getElementById('loginBtn').addEventListener('click', showLogin);
    
    // Logout button
    document.getElementById('logoutBtn').addEventListener('click', logout);
    
    // Checkout button
    document.getElementById('checkoutBtn').addEventListener('click', handleCheckout);
    
    // Enter key di form login
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });
    document.getElementById('loginUsername').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });

    // Load data
    loadCart();
    checkAuth();
    renderProducts();
    renderCart();
});
</script>

</body>
</html>
